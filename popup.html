<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 220px;
      padding: 12px 16px;
      margin: 0;
      font-size: 14px;
    }
    h2 { margin: 0 0 8px; font-size: 15px; }
    p  { margin: 0; color: #555; line-height: 1.5; }
    .legend { margin-top: 10px; }
    .dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <h2>RMP for Cornell Roster</h2>
  <p>Browse to a Cornell class roster — ratings appear automatically next to each instructor.</p>
  <div class="legend">
    <div><span class="dot" style="background:#4caf50"></span>≥ 4.0 — Great</div>
    <div><span class="dot" style="background:#ff9800"></span>2.7–3.9 — OK</div>
    <div><span class="dot" style="background:#f44336"></span>&lt; 2.7 — Rough</div>
    <div><span class="dot" style="background:#9e9e9e"></span>N/A — Not found</div>
  </div>
</body>
</html>
